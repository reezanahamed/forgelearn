<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ForgeLearn</title>
    <!--
      Guided-lesson redesign. Three columns: the SYLLABUS rail (mission, lessons,
      progress) on the left, the LESSON flow in the middle (concept, an interactive
      widget, a check, the AI demo, then your build task and review), and the
      WORKSPACE on the right (files, an editor you type in, Run, Hint, Check).
      Structure only; styling in /static/styles.css, behaviour in /static/app.js.
    -->
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>ForgeLearn</h1>
      <span class="tagline">learn anything by building it</span>
      <button type="button" id="new-session" class="new-session" hidden>+ New</button>
    </header>

    <div id="layout">
      <!-- Left: syllabus rail. -->
      <aside id="syllabus" aria-label="Your course" hidden>
        <div class="rail-block">
          <div class="rail-label">Mission</div>
          <p id="mission"></p>
        </div>
        <div class="rail-block">
          <div class="rail-label">Lessons</div>
          <ol id="lessons" class="lessons"></ol>
        </div>
        <div class="rail-block">
          <div class="rail-label">Progress vs day one</div>
          <ul id="progress" class="progress"></ul>
        </div>
        <button type="button" id="export" class="export" hidden>Export as HTML</button>
      </aside>

      <!-- Middle: the lesson flow + composer. -->
      <section id="chat-col">
        <main id="chat" aria-live="polite">
          <div id="intro" class="intro">
            <p>What do you want to learn?</p>
            <p class="hint">
              e.g. <em>reinforcement learning</em>, <em>how orbits work</em>,
              <em>the French Revolution</em>
            </p>
          </div>
        </main>

        <form id="composer" autocomplete="off" hidden>
          <select id="agent" aria-label="Which AI" title="Which AI builds the demo"></select>
          <select id="grade" aria-label="Explanation level" title="How simply should the AI explain?">
            <option value="5">Grade 5</option>
            <option value="7" selected>Grade 7</option>
            <option value="9">Grade 9</option>
            <option value="12">Grade 12</option>
            <option value="14">College</option>
          </select>
          <input id="prompt" name="prompt" placeholder="What do you want to learn?" aria-label="Your answer" autofocus />
          <button type="submit" id="send">Send</button>
        </form>
      </section>

      <!-- Right: the workspace + editor. -->
      <aside id="workspace" aria-label="Workspace">
        <div class="ws-head">
          <span>Workspace</span>
          <span class="ws-actions">
            <button type="button" id="hint" disabled title="Get a hint">Hint</button>
            <button type="button" id="run" disabled>Run</button>
          </span>
        </div>
        <ul id="files" class="files">
          <li class="files-empty">Files appear here as you build.</li>
        </ul>
        <div id="editor-wrap" class="editor-wrap" hidden>
          <div class="editor-head">
            <input id="editor-name" class="editor-name" spellcheck="false" value="main.py" aria-label="File name" />
            <span class="editor-actions">
              <button type="button" id="save" title="Save (Ctrl+S)">Save</button>
              <button type="button" id="check-work" class="primary">Check my work</button>
            </span>
          </div>
          <textarea id="editor" class="editor" spellcheck="false" placeholder="Write your code here, then Save and Check my work…"></textarea>
        </div>
      </aside>
    </div>

    <!-- File viewer modal (for reading files / images). -->
    <div id="viewer" class="viewer" hidden>
      <div class="viewer-panel">
        <div class="viewer-head">
          <span id="viewer-name"></span>
          <button type="button" id="viewer-close" aria-label="Close">✕</button>
        </div>
        <div id="viewer-content" class="viewer-content"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
